<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile Download Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:"SF Mono","Fira Code",Consolas,monospace;font-size:13px;min-height:100vh}
.topbar{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;gap:14px}
.dot{width:10px;height:10px;border-radius:50%;background:#3fb950;animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-size:15px;font-weight:700}
.meta{margin-left:auto;font-size:11px;color:#8b949e}

.stats{display:flex;gap:1px;background:#30363d;border-bottom:1px solid #30363d}
.stat{flex:1;background:#161b22;padding:12px 20px}
.stat .val{font-size:24px;font-weight:700;color:#58a6ff}
.stat .lbl{font-size:11px;color:#8b949e;margin-top:3px}

.table-wrap{padding:20px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th{text-align:left;padding:8px 12px;font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #30363d;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #21262d;font-size:12px;vertical-align:middle}
tr:hover td{background:#161b22}
tr:last-child td{border-bottom:none}

.target-badge{background:#0d2044;color:#58a6ff;border:1px solid #58a6ff;border-radius:3px;font-size:10px;padding:2px 7px;font-weight:700}
.uuid{color:#8b949e;font-size:11px;font-family:inherit}
.ip{color:#bc8cff}
.ts{color:#8b949e}
.ua{color:#6e7681;font-size:11px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tmpl-badge{background:#1a3a1a;color:#3fb950;border:1px solid #3fb950;border-radius:3px;font-size:10px;padding:2px 6px}

.empty{text-align:center;color:#30363d;padding:60px 20px;font-size:14px}
.refresh{font-size:11px;color:#8b949e}
</style>
</head>
<body>

<div class="topbar">
  <div class="dot"></div>
  <h1>Profile Download Log</h1>
  <span class="meta refresh" id="lastRefresh">polling…</span>
</div>

<div class="stats">
  <div class="stat"><div class="val" id="cntTotal">0</div><div class="lbl">Downloads</div></div>
  <div class="stat"><div class="val" id="cntTargets" style="color:#bc8cff">0</div><div class="lbl">Unique Targets</div></div>
  <div class="stat"><div class="val" id="cntIPs" style="color:#d29922">0</div><div class="lbl">Unique IPs</div></div>
</div>

<div class="table-wrap">
  <table id="tbl">
    <thead>
      <tr>
        <th>Time</th>
        <th>Target</th>
        <th>Template</th>
        <th>IP</th>
        <th>UUID</th>
        <th>User Agent</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="6" class="empty">No downloads yet.</td></tr>
    </tbody>
  </table>
</div>

<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(data){
  var targets = new Set(), ips = new Set();
  data.forEach(function(d){ if(d.target) targets.add(d.target); if(d.ip) ips.add(d.ip); });
  document.getElementById('cntTotal').textContent   = data.length;
  document.getElementById('cntTargets').textContent = targets.size;
  document.getElementById('cntIPs').textContent     = ips.size;

  if(!data.length){
    document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">No downloads yet.</td></tr>';
    return;
  }

  var rows = data.slice().reverse().map(function(d){
    return '<tr>'+
      '<td class="ts">'+esc(d.ts)+'</td>'+
      '<td>'+(d.target ? '<span class="target-badge">'+esc(d.target)+'</span>' : '<span style="color:#30363d">—</span>')+'</td>'+
      '<td><span class="tmpl-badge">'+esc(d.tmpl||'webclip')+'</span></td>'+
      '<td class="ip">'+esc(d.ip)+'</td>'+
      '<td class="uuid">'+esc((d.clip_uuid||'').substring(0,8))+'…</td>'+
      '<td class="ua" title="'+esc(d.ua)+'">'+esc(d.ua)+'</td>'+
    '</tr>';
  }).join('');
  document.getElementById('tbody').innerHTML = rows;
}

function poll(){
  fetch('/profile-log')
    .then(function(r){ return r.json(); })
    .then(function(data){
      render(data);
      document.getElementById('lastRefresh').textContent = 'updated '+new Date().toLocaleTimeString();
    })
    .catch(function(){
      document.getElementById('lastRefresh').textContent = 'connection error — retrying…';
    });
}

poll();
setInterval(poll, 4000);
</script>
</body>
</html>
